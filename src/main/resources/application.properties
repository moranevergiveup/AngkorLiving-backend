spring.application.name=AngkorLeving_Backend

# Database (from env variables)
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server port (Render injects $PORT)
server.port=${PORT:8080}

# JWT secret
jwt.secret=${JWT_SECRET}

# Cloudinary
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api_key=${CLOUDINARY_API_KEY}
cloudinary.api_secret=${CLOUDINARY_API_SECRET}

# Bakong / NBC API
BAKONG_ACCOUNT_USERNAME=${BAKONG_ACCOUNT_USERNAME}
BAKONG_ACCOUNT_NAME=${BAKONG_ACCOUNT_NAME}
BAKONG_LOCATION=${BAKONG_LOCATION}
NBC_API_URL=${NBC_API_URL}
BAKONG_API_TOKEN=${BAKONG_API_TOKEN}
BAKONG_EMAIL = ${BAKONG_EMAIL}